name: daily

on:
  schedule:
    # GitHub Actions schedule 是 best-effort，高峰期可能延迟数小时甚至跳过。
    # 给三个时间点，任一触发即跑；同一天重跑是幂等的（fetched=N stored=0 summarize=noop）。
    - cron: "0 23 * * *"   # UTC 23:00 = 北京 07:00
    - cron: "30 0 * * *"   # UTC 00:30 = 北京 08:30  (兜底 1)
    - cron: "0 2 * * *"    # UTC 02:00 = 北京 10:00  (兜底 2)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data-branch workdir (fetch existing or start orphan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          rm -rf data-branch
          mkdir data-branch
          cd data-branch
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if git fetch --depth=1 origin data 2>/dev/null; then
            git checkout -q -b data origin/data
            echo "Restored data branch."
          else
            git checkout -q --orphan data
            git rm -rfq . 2>/dev/null || true
            echo "data branch missing; will create on first push."
          fi

      - name: Restore previous state from data branch
        run: |
          mkdir -p data docs
          cp -r data-branch/data/. data/ 2>/dev/null || true
          cp -r data-branch/docs/. docs/ 2>/dev/null || true

      - name: Run pipeline (fetch + summarize + render)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.main fetch
          python -m src.main summarize
          python -m src.main render --output-dir docs

      - name: Commit & push to data branch
        run: |
          set -e
          cd data-branch
          rm -rf data docs
          cp -r ../data ./data 2>/dev/null || true
          cp -r ../docs ./docs 2>/dev/null || true
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A data docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily update $(date -u +%Y-%m-%d)"
            git push -u origin data
          fi
