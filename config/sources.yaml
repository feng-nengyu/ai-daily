# 默认信息源。用户在 fork 中可改这个文件来增删源。
sources:
  - name: arxiv-cs-ai
    type: arxiv
    categories: [cs.AI, cs.CL, cs.MA]
    max_results: 50

  - name: huggingface-blog
    type: rss
    url: https://huggingface.co/blog/feed.xml

  - name: github-trending-agent
    type: github
    topic: agent
    min_stars: 10

  - name: github-trending-llm
    type: github
    topic: llm
    min_stars: 10

  - name: github-trending-mcp
    type: github
    topic: mcp
    min_stars: 5

  - name: openai-blog
    type: rss
    url: https://openai.com/blog/rss.xml

  # Anthropic 暂无可用的公开 RSS（2026-05 验证：substack 弃用、官网 /news/rss.xml /feed 全 404）。
  # - name: anthropic-news
  #   type: rss
  #   url: <TBD>

  - name: deepmind-blog
    type: rss
    url: https://deepmind.google/blog/rss.xml

  # DeepSeek 暂无公开 RSS feed（2026-05 验证），如官方上线再添加。
  # - name: deepseek-news
  #   type: rss
  #   url: <TBD>

  - name: langchain-blog
    type: rss
    url: https://blog.langchain.dev/rss.xml

  # LlamaIndex 暂无可用的公开 RSS（2026-05 验证：medium feed 死、官网 feed.xml/index.xml 全 404）。
  # - name: llamaindex-blog
  #   type: rss
  #   url: <TBD>

  # HN Algolia 的 query 参数不支持 OR/括号语法（会被当字面 token 搜），
  # 只能用单个或空格分隔的关键词。这里用 "AI" 作为最宽口径，配合 min_points 过滤。
  - name: hackernews-ai
    type: hackernews
    query: "AI"
    min_points: 100

  - name: qbitai
    type: rss
    url: https://www.qbitai.com/feed

  # 机器之心暂无可用的公开 RSS（2026-05 验证：/rss /feed 返回非 feed 页面）。
