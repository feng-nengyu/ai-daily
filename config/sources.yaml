# 默认信息源。用户在 fork 中可改这个文件来增删源。
sources:
  # ── 论文 / 学术 ──
  - name: arxiv-cs-ai
    type: arxiv
    categories: [cs.AI, cs.CL, cs.MA]
    max_results: 50

  - name: huggingface-blog
    type: rss
    url: https://huggingface.co/blog/feed.xml

  # ── GitHub Topic 趋势 ──
  - name: github-trending-agent
    type: github
    topic: agent
    min_stars: 10

  - name: github-trending-llm
    type: github
    topic: llm
    min_stars: 10

  - name: github-trending-mcp
    type: github
    topic: mcp
    min_stars: 5

  # ── 主要厂商 / 实验室 博客 ──
  - name: openai-blog
    type: rss
    url: https://openai.com/blog/rss.xml

  - name: deepmind-blog
    type: rss
    url: https://deepmind.google/blog/rss.xml

  - name: google-research
    type: rss
    url: https://research.google/blog/rss/

  - name: nvidia-dev-blog
    type: rss
    url: https://developer.nvidia.com/blog/feed/

  - name: microsoft-research
    type: rss
    url: https://www.microsoft.com/en-us/research/feed/

  - name: together-ai-blog
    type: rss
    url: https://www.together.ai/blog/rss.xml

  # 以下厂商 2026-05 验证暂无可用公开 RSS feed；如官方上线再添加：
  # - Anthropic（substack 弃用、官网 /news/rss.xml /research/rss.xml /index.xml 全 404）
  # - Mistral（/news/feed.xml /feed.xml /rss.xml 全 404）
  # - Meta AI（ai.meta.com/blog/rss/ 等返回 400）
  # - Cohere（/blog/rss.xml 200 但不是 feed）
  # - xAI（/news/rss 403）
  # - Stability AI（404）
  # - DeepSeek（无公开 RSS）

  # ── 框架方 ──
  - name: langchain-blog
    type: rss
    url: https://blog.langchain.dev/rss.xml

  # LlamaIndex 暂无可用公开 RSS（medium feed 死、官网各种 feed 路径 404）。
  # - name: llamaindex-blog
  #   type: rss
  #   url: <TBD>

  # ── 行业评论 / 专家个人博客 / 通讯 ──
  - name: lilian-weng
    type: rss
    url: https://lilianweng.github.io/index.xml

  - name: simon-willison
    type: rss
    url: https://simonwillison.net/atom/everything/

  - name: sebastian-raschka
    type: rss
    url: https://magazine.sebastianraschka.com/feed

  - name: andrej-karpathy
    type: rss
    url: https://karpathy.github.io/feed.xml

  - name: import-ai
    type: rss
    url: https://importai.substack.com/feed

  # ── 社区聚合 ──
  - name: hackernews-ai
    type: hackernews
    query: "AI"
    min_points: 100

  - name: qbitai
    type: rss
    url: https://www.qbitai.com/feed

