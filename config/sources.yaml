# 默认信息源。用户在 fork 中可改这个文件来增删源。
sources:
  - name: arxiv-cs-ai
    type: arxiv
    categories: [cs.AI, cs.CL, cs.MA]
    max_results: 50

  - name: huggingface-blog
    type: rss
    url: https://huggingface.co/blog/feed.xml

  - name: github-trending-agent
    type: github
    topic: agent
    min_stars: 10

  - name: github-trending-llm
    type: github
    topic: llm
    min_stars: 10

  - name: github-trending-mcp
    type: github
    topic: mcp
    min_stars: 5

  - name: openai-blog
    type: rss
    url: https://openai.com/blog/rss.xml

  - name: anthropic-news
    type: rss
    url: https://anthropic.substack.com/feed

  - name: deepmind-blog
    type: rss
    url: https://deepmind.google/blog/rss.xml

  # DeepSeek 暂无公开 RSS feed（2026-05 验证），如官方上线再添加。
  # - name: deepseek-news
